name: Feature request
description: Suggest new functionality or an improvement
title: 'feat: '
labels: [feature, needs triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Describe the situation, not the solution.
      placeholder: There is no way to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why you set them aside.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Is this a breaking change?
      options:
        - 'No — backwards compatible'
        - 'Yes — changes existing behaviour or API'
        - 'Not sure'
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, sketches, prior art, or anything else useful.
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions and this is not a duplicate.
          required: true
        - label: I agree to follow this project's [Code of Conduct](https://github.com/Zarlania/zarlania-app/blob/master/CODE_OF_CONDUCT.md).
          required: true
