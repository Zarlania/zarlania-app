name: Bug report
description: Report something that is not working as intended
title: 'bug: '
labels: [bug, needs triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug.

        Please do not report security vulnerabilities here — use
        [private reporting](https://github.com/Zarlania/zarlania-app/security/advisories/new) instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is going wrong?
      placeholder: The page renders blank on first load in Safari.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full error and any relevant logs.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Release tag, or the commit SHA if running from source.
      placeholder: v1.2.0
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Where did this happen?
      options:
        - Local (npm run dev)
        - Local (Docker Compose)
        - Deployed (Render)
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Browser and version, OS, screen size, or anything else that might matter.
    validations:
      required: false

  - type: checkboxes
    id: confirmations
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: I agree to follow this project's [Code of Conduct](https://github.com/Zarlania/zarlania-app/blob/master/CODE_OF_CONDUCT.md).
          required: true
