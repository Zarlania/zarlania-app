name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel superseded runs on the same branch; the newest commit is the only one
# whose result matters.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # `npm ci` installs the frozen lockfile without re-resolving peer
  # dependencies, so an unsatisfiable peer graph — @eslint/js@10 pinned against
  # eslint@9, say — passes every job that uses it and only fails on Render,
  # which resolves from scratch. That is how a broken build once reached
  # production. This job reproduces the from-scratch resolve and fails here
  # instead, without installing node_modules (--package-lock-only) or writing
  # anything (--dry-run). --ignore-scripts is required: npm otherwise runs the
  # `prepare` lifecycle (husky), which fails here because no node_modules is
  # installed — an unrelated error that would mask the check.
  resolve-check:
    name: Dependency graph resolves
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Verify dependency graph resolves from scratch
        run: npm install --package-lock-only --dry-run --ignore-scripts

  build:
    name: Build & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to post the coverage comment on pull requests.
      pull-requests: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      # Coverage thresholds live in vite.config.ts; this fails below 80%.
      - name: Test with coverage
        run: npm run test:coverage

      - name: Comment coverage on pull request
        if: ${{ !cancelled() && github.event_name == 'pull_request' }}
        # Pull requests from forks get a read-only token, so the comment cannot be
        # posted there. The coverage gate itself already ran in the step above —
        # this is reporting only, and must not fail the build.
        continue-on-error: true
        uses: davelosert/vitest-coverage-report-action@8b157684c6a6b259b97d45e72b44242865c0f6a5 # v2.12.2
        with:
          json-summary-path: ./coverage/coverage-summary.json
          json-final-path: ./coverage/coverage-final.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          name: Coverage report

      - name: Build
        run: npm run build

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  storybook:
    name: Storybook builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Proves every story still compiles and renders. This is what catches a
      # component change that breaks its own documentation.
      - name: Build Storybook
        run: npm run build-storybook

      - name: Upload Storybook
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: storybook-static
          path: storybook-static/
          if-no-files-found: error
          retention-days: 7

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Required for the GitHub Actions cache backend below: the default docker
      # driver cannot export a build cache, only the docker-container driver
      # this sets up can.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Build only — this proves the Dockerfile is valid without publishing
      # anything. Render builds the Static Site itself and never uses this image.
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          target: runtime
          push: false
          load: false
          tags: zarlania-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
