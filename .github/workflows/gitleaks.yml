name: Gitleaks

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly full-history sweep catches secrets committed before this workflow
    # existed, and anything a force-push slipped past the per-PR scan.
    - cron: '0 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan for secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to publish the SARIF report to the Security tab.
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the scan sees every commit, not just the tip.
          fetch-depth: 0

      # The official gitleaks-action requires a paid licence key for
      # organisation-owned repositories. Running the CLI image directly is
      # functionally identical and free.
      - name: Run gitleaks
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect \
              --source=/repo \
              --config=/repo/.gitleaks.toml \
              --report-format=sarif \
              --report-path=/repo/gitleaks-report.sarif \
              --redact \
              --verbose

      - name: Upload SARIF report
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-report.sarif
          category: gitleaks
