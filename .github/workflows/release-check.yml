name: Release check

# Validates that the package.json version bump matches the PR's release:* label. Split out from
# ci.yml so it can listen to label events WITHOUT the heavy required checks running (and skipping)
# on those events: a skipped required check is treated as passing, so re-running them on a label
# change would let a label launder a failing check into a mergeable state. This job never skips,
# so its result is always genuine, and it re-validates whenever the release:* label changes.
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  release-check:
    name: Release version bump
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # need tags to compute the latest release version
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Determine bump kind from release label
        id: bump
        env:
          LABELS: ${{ toJSON(github.event.pull_request.labels.*.name) }}
        run: |
          kinds=$(printf '%s' "$LABELS" | grep -oE 'release:(major|minor|patch)' | sed 's/release://' | sort -u || true)
          count=$(printf '%s\n' "$kinds" | grep -c . || true)
          if [ "$count" -gt 1 ]; then
            echo "::error::multiple release:* labels found ($(echo "$kinds" | tr '\n' ' ')); apply exactly one." >&2
            exit 1
          fi
          kind="${kinds:-patch}"
          echo "kind=$kind" >> "$GITHUB_OUTPUT"
          echo "Bump kind: $kind"
      - name: Verify package.json version matches the bump
        run: python scripts/release_tool/release_cli.py verify "${{ steps.bump.outputs.kind }}"
