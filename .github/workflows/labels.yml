name: Labels

on:
  push:
    branches: [master]
    paths:
      - .github/labels.yml
      - .github/workflows/labels.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v7

      # `.github/labels.yml` is the source of truth. Labels created by hand in
      # the UI are deleted on the next run.
      - name: Apply labels
        uses: crazy-max/ghaction-github-labeler@v6
        with:
          yaml-file: .github/labels.yml
          skip-delete: false
          dry-run: false
