name: Labels

on:
  push:
    branches: [master]
    paths:
      - .github/labels.yml
      - .github/workflows/labels.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync labels
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # `.github/labels.yml` is the source of truth. Labels created by hand in
      # the UI are deleted on the next run.
      - name: Apply labels
        uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d # v6.0.0
        with:
          yaml-file: .github/labels.yml
          skip-delete: false
          dry-run: false
