# Serves the built single-page application. Used by the `runtime` stage of the
# Dockerfile for local production-like runs; Render's Static Site applies the
# equivalent rules from render.yaml instead.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/snippets/security-headers.conf;

    # Hashed asset filenames change whenever content changes, so they can be
    # cached indefinitely.
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # index.html must never be cached, or clients keep loading an old bundle
    # that references assets which no longer exist.
    location = /index.html {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Client-side routing: unknown paths are handled by the app, not the server.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
