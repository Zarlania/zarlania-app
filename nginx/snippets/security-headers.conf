# Security headers, kept in one place and included wherever they are needed.
#
# nginx does NOT merge add_header directives across levels: a location block that
# declares any add_header of its own discards every add_header inherited from the
# server block. So each location that sets its own Cache-Control must include
# this file explicitly, or it would silently serve responses without these
# headers.
#
# Add a Content-Security-Policy here once the app's asset and API origins settle.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
